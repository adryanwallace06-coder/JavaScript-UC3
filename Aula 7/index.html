<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Formulários</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
    <div class="container">
        <h1>Cadastro de Usuário</h1>
 
        <form id="formulario">
 
            <div class="campo">
                <label for="nome">Nome *</label>
                <div class="input-container">
                    <input type="text" id="nome">
                    <span class="icone"></span>
                </div>
                <small class="erro"></small>
            </div>
 
            <div class="campo">
                <label for="email">E-mail *</label>
                <div class="input-container">
                    <input type="text" id="email">
                    <span class="icone"></span>
                </div>
                <small class="erro"></small>
            </div>
 
            <div class="campo">
                <label for="telefone">Telefone *</label>
                <div class="input-container">
                    <input type="text" id="telefone" placeholder="(11) 99999-9999">
                    <span class="icone"></span>
                </div>
                <small class="erro"></small>
            </div>
 
            <div class="campo">
                <label for="cpf">CPF *</label>
                <div class="input-container">
                    <input type="text" id="cpf" placeholder="000.000.000-00">
                    <span class="icone"></span>
                </div>
                <small class="erro"></small>
            </div>
 
            <div class="campo">
                <label for="rg">RG *</label>
                <div class="input-container">
                    <input type="text" id="rg" placeholder="00.000.000-0">
                    <span class="icone"></span>
                </div>
                <small class="erro"></small>
            </div>
 
            <div class="campo">
                <label for="oe">Órgão expedidor *</label>
                <div class="input-container">
                    <input type="text" id="oe">
                    <span class="icone"></span>
                </div>
                <small class="erro"></small>
            </div>
 
            <div class="campo">
                <label for="endereco">Endereço *</label>
                <div class="input-container">
                    <input type="text" id="endereco">
                    <span class="icone"></span>
                </div>
                <small class="erro"></small>
            </div>
 
            <div class="campo">
                <label for="complemento">Complemento </label>
                <div class="input-container">
                    <input type="text" id="complemento">
                    <span class="icone"></span>
                </div>
                <small class="erro"></small>
            </div>
 
            <div class="campo">
                <label for="bairro">Bairro *</label>
                <div class="input-container">
                    <input type="text" id="bairro">
                    <span class="icone"></span>
                </div>
                <small class="erro"></small>
            </div>
 
            <button type="submit">Enviar</button>
 
        </form>
 
        <p id="mensagemSucesso"></p>
    </div>
 
    <script src="script.js"></script>
</body>
</html>
