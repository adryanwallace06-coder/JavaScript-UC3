<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Site exemplo</title>
</head>

<body>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <nav class="sidebar" id="sidebar">
        <h2>Meu site</h2>
        <a href="#">🏠 Início </a>
        <a href="#">📦 Produtos</a>
        <a href="#">🛠️ Serviço</a>
        <a href="#">📞 Contato</a>
    </nav>

    <div class="content">
        <div class="carousel">
            <button class="prev" onclick="mudarSlide(-1)">❮</button>

            <div class="slides">
                <img src="https://picsum.photos/id/1015/1200/400" class="slide active">
                <img src="https://picsum.photos/id/1016/1200/400" class="slide">
                <img src="https://picsum.photos/id/1018/1200/400" class="slide">
            </div>

            <button class="next" onclick="mudarSlide(1)">❯</button>
        </div>

        <h2>Nosso produtos</h2>

        <section class="cards">

            <div class="card">
                <img src="https://picsum.photos/300/200?1">
                <h3>Produto 1</h3>
                <p>Descrição do produto.</p>
                <button>Comprar</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/200?2">
                <h3>Produto 2</h3>
                <p>Descrição do produto.</p>
                <button>Comprar</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/200?3">
                <h3>Produto 3</h3>
                <p>Descrição do produto.</p>
                <button>Comprar</button>
            </div>

        </section>
    </div>
</body>
<script src="script.js"></script>
</html>
