<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuários</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Cadastro de Usuários</h1>

        <input type="text" id="nome" placeholder="Digite o nome">

        <input type="email" id="email" placeholder="Digite o e-mail">

        <input type="text" id="telefone" placeholder="Digite o telefone">

        <button id="btnCadastrar" disabled>Cadastrar</button>

        <p id="mensagem"></p>

        <hr>

        <h2>Pesquisar Usuário</h2>

        <input type="text" id="filtro" placeholder="Pesquisar pelo nome">

        <ul id="listaUsuarios"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
